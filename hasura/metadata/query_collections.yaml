- name: scavenger_hunt
  definition:
    queries:
      - name: teams
        query: |
          query teams {
            teams(order_by: {score:desc}) {
              id
              name
              members
              score
            }
          }
      - name: team_by_pk
        query: |
          query team_by_pk ($teamId: Int!) {
            teams_by_pk(id: $teamId) {
              id
              name
              members
              score
            }
          }
      - name: items
        query: |
          query items {
            items(order_by: {display_order:asc}) {
              id
              item
              points
              category
              display_order
            }
          }
      - name: submissions
        query: |
          query submissions {
            submissions(order_by: {time_submitted:desc}) {
              id
              team_id
              item_id
              image_url
              time_submitted
              status
              reviewed_at
              reviewed_by
            }
          }
      - name: game_settings
        query: |
          query game_settings {
            game_settings_by_pk(id: 1) {
              id
              auto_approval_enabled
              updated_at
              updated_by
            }
          }
      - name: insert_submission
        query: |
          mutation insert_submission ($object: submissions_insert_input!) {
            insert_submissions_one(object: $object) {
              id
              team_id
              item_id
              image_url
              time_submitted
              status
              reviewed_at
              reviewed_by
            }
          }
      - name: update_score
        query: |
          mutation update_score ($teamId: Int!, $object: teams_set_input!) {
            update_teams_by_pk(pk_columns: {id:$teamId}, _set: $object) {
              id
              score
            }
          }
      - name: update_name_by_pk
        query: |
          mutation update_name_by_pk ($teamId: Int!, $object: teams_set_input!) {
            update_teams_by_pk(pk_columns: {id:$teamId}, _set: $object) {
              id
              name
            }
          }
      - name: approve_submission
        query: |
          mutation approve_submission ($submissionId: Int!, $adminId: Int!) {
            approve_submission(args: {p_submission_id:$submissionId,p_reviewed_by:$adminId}) {
              id
              team_id
              item_id
              status
              reviewed_at
              reviewed_by
            }
          }
      - name: undo_approval
        query: |
          mutation undo_approval ($submissionId: Int!, $adminId: Int!) {
            undo_approval(args: {p_submission_id:$submissionId,p_reviewed_by:$adminId}) {
              id
              team_id
              item_id
              status
              reviewed_at
              reviewed_by
            }
          }
      - name: unsubmit_submission
        query: |
          mutation unsubmit_submission ($submissionId: Int!, $teamId: Int!) {
            unsubmit_submission(args: {p_submission_id:$submissionId,p_team_id:$teamId}) {
              id
              team_id
              item_id
              status
              reviewed_at
              reviewed_by
            }
          }
      - name: deny_submission
        query: |
          mutation deny_submission ($submissionId: Int!, $adminId: Int!) {
            deny_submission(args: {p_submission_id:$submissionId,p_reviewed_by:$adminId}) {
              id
              team_id
              item_id
              status
              reviewed_at
              reviewed_by
            }
          }
      - name: reset_game
        query: |
          mutation reset_game ($adminId: Int!) {
            reset_game(args: {p_admin_id:$adminId}) {
              id
              name
              members
              score
            }
          }
      - name: set_auto_approval
        query: |
          mutation set_auto_approval ($adminId: Int!, $enabled: Boolean!) {
            set_auto_approval(args: {p_admin_id:$adminId,p_enabled:$enabled}) {
              id
              auto_approval_enabled
              updated_at
              updated_by
            }
          }
